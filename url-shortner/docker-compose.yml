services:
  backend:
    image: minikanva/url-backend:latest
    container_name: url-backend
    ports:
      - "4000:4000"
    restart: always

  frontend:
    image: minikanva/url-frontend:latest
    container_name: url-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: always
