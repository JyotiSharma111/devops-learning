apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-frontend
  template:
    metadata:
      labels:
        app: url-frontend
    spec:
      containers:
      - name: url-frontend
        image: minikanva/url-frontend:v3
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: url-frontend
spec:
  type: NodePort
  selector:
    app: url-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
