name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./url-shortner/backend
          push: true
          tags: minikanva/url-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./url-shortner/frontend
          push: true
          tags: minikanva/url-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop url-backend url-frontend 2>/dev/null || true
            cd ~/devops-learning/url-shortner
            docker-compose pull
            docker-compose up -d
            docker system prune -f
